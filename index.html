<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xooki's page</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a0f'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='monospace' font-weight='700' font-size='18' fill='%23a855f7'%3Exo%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --purple:    #a855f7;
      --purple-dim: #7c3aed;
      --purple-glow: rgba(168,85,247,0.15);
      --purple-glow2: rgba(168,85,247,0.06);
      --text:      #e2e8f0;
      --muted:     #64748b;
      --online:    #22c55e;
      --idle:      #f59e0b;
      --dnd:       #ef4444;
      --offline:   #4b5563;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(168,85,247,0.015) 2px,
        rgba(168,85,247,0.015) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(168,85,247,0.08), 0 0 120px rgba(168,85,247,0.04);
    }

    /* ── header band ── */
    .header {
      position: relative;
      height: 80px;
      background: linear-gradient(135deg, #12001f 0%, #1a0035 50%, #0d0020 100%);
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23a855f7' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .header-glow {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 40px;
      background: radial-gradient(ellipse, rgba(168,85,247,0.3) 0%, transparent 70%);
    }

    /* ── avatar ── */
    .avatar-wrap {
      position: absolute;
      top: 44px;
      left: 24px;
      z-index: 2;
    }
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid var(--bg);
      background: var(--border);
      object-fit: cover;
      display: block;
    }
    .avatar-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid var(--bg);
      background: linear-gradient(135deg, #2d0050, #1a0035);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem;
      color: var(--purple);
      font-weight: 700;
    }
    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid var(--surface);
      background: var(--offline);
      transition: background 0.4s;
    }
    .status-dot.online  { background: var(--online); }
    .status-dot.idle    { background: var(--idle); }
    .status-dot.dnd     { background: var(--dnd); }
    .status-dot.offline { background: var(--offline); }

    /* ── body ── */
    .body {
      padding: 48px 24px 24px;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--purple);
      letter-spacing: -0.02em;
    }
    .name-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--border);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .bio {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 16px;
      font-style: italic;
      min-height: 1rem;
      transition: opacity 0.3s;
    }
    .bio.hidden { opacity: 0; }

    /* ── spotify card ── */
    .spotify-card {
      background: var(--purple-glow2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 64px;
      transition: border-color 0.3s;
    }
    .spotify-card.playing {
      border-color: rgba(168,85,247,0.3);
      background: var(--purple-glow);
    }
    .spotify-art {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--border);
    }
    .spotify-art-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .spotify-info { flex: 1; min-width: 0; }
    .spotify-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }
    .spotify-song {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .spotify-artist {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .spotify-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 20px;
      flex-shrink: 0;
    }
    .spotify-bar {
      width: 3px;
      background: var(--purple);
      border-radius: 2px;
      animation: none;
    }
    .spotify-card.playing .spotify-bar:nth-child(1) { animation: bar 0.8s ease-in-out infinite alternate; }
    .spotify-card.playing .spotify-bar:nth-child(2) { animation: bar 0.6s ease-in-out 0.2s infinite alternate; }
    .spotify-card.playing .spotify-bar:nth-child(3) { animation: bar 1s ease-in-out 0.1s infinite alternate; }
    @keyframes bar {
      from { height: 4px; }
      to   { height: 18px; }
    }

    /* ── discord presence ── */
    .presence-card {
      background: var(--purple-glow2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 20px;
      min-height: 48px;
      transition: border-color 0.3s;
      display: none;
    }
    .presence-card.visible { display: block; }
    .presence-card.active  { border-color: rgba(168,85,247,0.25); }
    .presence-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .presence-game {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .presence-icon {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--border);
      flex-shrink: 0;
    }
    .presence-icon-placeholder {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .presence-name {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
    }
    .presence-detail {
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* ── section title ── */
    .section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .section-title span {
      color: var(--purple);
      margin-right: 4px;
    }

    /* ── links grid ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .link-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.85rem;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .link-item:hover {
      border-color: rgba(168,85,247,0.4);
      background: var(--purple-glow2);
      transform: translateX(3px);
    }
    .link-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1rem;
    }
    .link-text { flex: 1; }
    .link-name {
      font-weight: 500;
      font-size: 0.83rem;
    }
    .link-sub {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .link-arrow {
      color: var(--muted);
      font-size: 0.75rem;
      transition: color 0.2s;
    }
    .link-item:hover .link-arrow { color: var(--purple); }

    /* icon backgrounds */
    .icon-letterboxd { background: rgba(0,172,93,0.12); }
    .icon-spotify    { background: rgba(30,215,96,0.10); }
    .icon-steam      { background: rgba(102,192,244,0.10); }
    .icon-discord    { background: rgba(88,101,242,0.12); }
    .icon-ow         { background: rgba(249,158,26,0.10); }
    .icon-val        { background: rgba(255,70,84,0.10); }

    /* ── game handles ── */
    .handles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .handle-item {
      background: var(--purple-glow2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .handle-game {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .handle-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--purple);
      font-weight: 500;
    }

    /* ── footer ── */
    .footer {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--border);
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .footer span { color: var(--purple); opacity: 0.4; }

    /* ── copy toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--purple);
      color: var(--purple);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      padding: 8px 16px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .spotify-bar { animation: none !important; }
    }
  </style>
</head>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const DISCORD_ID = '1012943554315817000';

  function setStatus(status) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + (status || 'offline');
  }

  function updateSpotify(spotify) {
    const card = document.getElementById('spotifyCard');
    const label = card.querySelector('.spotify-label');
    const song = document.getElementById('spotifySong');
    const artist = document.getElementById('spotifyArtist');
    const artWrap = document.getElementById('spotifyArtWrap');
    const link = document.getElementById('spotifyLink');

    if (spotify) {
      card.classList.add('playing');
      label.textContent = 'now playing';
      song.textContent = spotify.song;
      artist.textContent = spotify.artist;
      if (spotify.album_art_url) {
        artWrap.innerHTML = `<img class="spotify-art" src="${spotify.album_art_url}" alt="album art" />`;
      }
      if (spotify.track_id) {
        link.href = `https://open.spotify.com/track/${spotify.track_id}`;
      }
    } else {
      card.classList.remove('playing');
      label.textContent = 'not listening';
      song.textContent = '—';
      artist.textContent = '';
      artWrap.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#64748b" stroke-width="1.5"/><path d="M8 12a4 4 0 0 1 4-4" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="12" r="1.5" fill="#64748b"/></svg>`;
    }
  }

  function updatePresence(activities) {
    const card = document.getElementById('presenceCard');
    const nameEl = document.getElementById('presenceName');
    const detailEl = document.getElementById('presenceDetail');
    const iconWrap = document.getElementById('presenceIconWrap');

    // filter out Spotify (type 2)
    const game = activities.find(a => a.type === 0 || a.type === 1);
    if (game) {
      card.classList.add('visible', 'active');
      nameEl.textContent = game.name;
      detailEl.textContent = game.details || game.state || '';
      if (game.assets && game.assets.large_image) {
        const appId = game.application_id;
        const img = game.assets.large_image;
        // try to build icon url
        const src = img.startsWith('mp:') 
          ? `https://media.discordapp.net/${img.slice(3)}`
          : `https://cdn.discordapp.com/app-assets/${appId}/${img}.png`;
        iconWrap.innerHTML = `<img class="presence-icon" src="${src}" onerror="this.style.display='none'" alt="" />`;
      }
    } else {
      card.classList.remove('visible', 'active');
    }
  }

  function updateAvatar(user) {
    const wrap = document.getElementById('avatarWrap');
    const tag = document.getElementById('discordTag');
    if (user.avatar) {
      const ext = user.avatar.startsWith('a_') ? 'gif' : 'png';
      wrap.outerHTML = `<img class="avatar" id="avatarWrap" src="https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=128" alt="avatar" />`;
    }
    if (user.discriminator && user.discriminator !== '0') {
      tag.textContent = '#' + user.discriminator;
    } else {
      tag.textContent = '';
    }
  }

  function updateBio(customStatus) {
    const bioEl = document.getElementById('bioText');
    if (customStatus && customStatus.state) {
      bioEl.textContent = (customStatus.emoji?.name ? customStatus.emoji.name + ' ' : '') + customStatus.state;
      bioEl.classList.remove('hidden');
    } else {
      bioEl.classList.add('hidden');
    }
  }

  async function fetchLanyard() {
    try {
      const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
      const json = await res.json();
      if (!json.success) return;
      const d = json.data;
      setStatus(d.discord_status);
      updateAvatar(d.discord_user);
      updateSpotify(d.listening_to_spotify ? d.spotify : null);
      updatePresence(d.activities || []);
      const custom = (d.activities || []).find(a => a.type === 4);
      updateBio(custom);
    } catch (e) {
      console.warn('Lanyard fetch failed', e);
    }
  }

  // WebSocket for live updates
  function connectWS() {
    const ws = new WebSocket('wss://api.lanyard.rest/socket');
    ws.onopen = () => {
      ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: DISCORD_ID } }));
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.op === 1) {
        setInterval(() => ws.send(JSON.stringify({ op: 3 })), msg.d.heartbeat_interval);
      }
      if (msg.op === 0 && (msg.t === 'INIT_STATE' || msg.t === 'PRESENCE_UPDATE')) {
        const d = msg.d[DISCORD_ID] || msg.d;
        if (!d) return;
        setStatus(d.discord_status);
        updateAvatar(d.discord_user);
        updateSpotify(d.listening_to_spotify ? d.spotify : null);
        updatePresence(d.activities || []);
        const custom = (d.activities || []).find(a => a.type === 4);
        updateBio(custom);
      }
    };
    ws.onclose = () => setTimeout(connectWS, 3000);
  }

  function copyHandle(text) {
    navigator.clipboard.writeText(text).then(() => showToast('copied: ' + text));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  fetchLanyard();
  connectWS();
</script>
</body>
</html>
