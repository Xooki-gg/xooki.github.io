<!DOCTYPE html>
<html lang="en">
<head>

  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://cdn.discordapp.com https://media.discordapp.net https://i.scdn.co data:; connect-src https://api.lanyard.rest wss://api.lanyard.rest;" />
  <title>xooki</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a0f'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='monospace' font-weight='700' font-size='18' fill='%23a855f7'%3Exo%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0a0a0f;
      --surface:      rgba(11,11,18,0.88);
      --border:       #2a1a3e;
      --purple:       #a855f7;
      --purple-dim:   #7c3aed;
      --purple-glow:  rgba(168,85,247,0.14);
      --purple-glow2: rgba(168,85,247,0.06);
      --text:         #e2e8f0;
      --muted:        #64748b;
      --online:       #22c55e;
      --idle:         #f59e0b;
      --dnd:          #ef4444;
      --offline:      #4b5563;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('background.jpg') center/cover no-repeat;
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }

    /* ── card / OS window ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid rgba(168,85,247,0.35);
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(168,85,247,0.1),
        0 0 40px rgba(168,85,247,0.12),
        0 0 80px rgba(168,85,247,0.05);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    /* ── titlebar ── */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 10px 14px;
      background: rgba(168,85,247,0.04);
      border-bottom: 1px solid var(--border);
      gap: 7px;
    }
    .tb-btn {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1.5px solid #a855f7;
    }
    .tb-btn svg { display: block; }

    /* ── body ── */
    .body {
      padding: 24px 22px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── avatar ── */
    .avatar-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .avatar, .avatar-placeholder {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--purple-dim);
      display: block;
    }
    .avatar {
      object-fit: cover;
      background: var(--border);
    }
    .avatar-placeholder {
      background: linear-gradient(135deg, #2d0050, #1a0035);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem;
      color: var(--purple);
      font-weight: 700;
    }
    .status-dot {
      position: absolute;
      bottom: 3px; right: 3px;
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 3px solid rgba(11,11,18,0.95);
      background: var(--offline);
      transition: background 0.4s;
    }
    .status-dot.online  { background: var(--online); }
    .status-dot.idle    { background: var(--idle); }
    .status-dot.dnd     { background: var(--dnd); }
    .status-dot.offline { background: var(--offline); }

    /* ── name + bio ── */
    .name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--purple);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .name-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
    }
    .bio {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      margin-bottom: 18px;
    }
    .bio.hidden { display: none; }

    /* ── spotify ── */
    .spotify-card {
      width: 100%;
      background: var(--purple-glow2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      transition: border-color 0.3s, background 0.3s;
    }
    .spotify-card.playing {
      border-color: rgba(168,85,247,0.35);
      background: var(--purple-glow);
    }
    .spotify-art {
      width: 38px; height: 38px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--border);
    }
    .spotify-art-placeholder {
      width: 38px; height: 38px;
      border-radius: 6px;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .spotify-info { flex: 1; min-width: 0; }
    .spotify-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }
    .spotify-song {
      font-size: 0.8rem; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .spotify-artist {
      font-size: 0.7rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .spotify-bars {
      display: flex; align-items: flex-end; gap: 2px;
      height: 20px; flex-shrink: 0;
    }
    .spotify-bar {
      width: 3px; background: var(--purple); border-radius: 2px;
    }
    .spotify-card.playing .spotify-bar:nth-child(1) { animation: bar 0.8s ease-in-out infinite alternate; }
    .spotify-card.playing .spotify-bar:nth-child(2) { animation: bar 0.6s ease-in-out 0.2s infinite alternate; }
    .spotify-card.playing .spotify-bar:nth-child(3) { animation: bar 1s ease-in-out 0.1s infinite alternate; }
    @keyframes bar { from { height: 4px; } to { height: 18px; } }

    /* ── presence ── */
    .presence-card {
      width: 100%;
      background: var(--purple-glow2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 16px;
      display: none;
      transition: border-color 0.3s;
    }
    .presence-card.visible { display: block; }
    .presence-card.active  { border-color: rgba(168,85,247,0.25); }
    .presence-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .presence-game { display: flex; align-items: center; gap: 10px; }
    .presence-icon {
      width: 36px; height: 36px; border-radius: 6px;
      object-fit: cover; background: var(--border); flex-shrink: 0;
    }
    .presence-icon-placeholder {
      width: 36px; height: 36px; border-radius: 6px;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .presence-name   { font-size: 0.82rem; font-weight: 500; color: var(--text); }
    .presence-detail { font-size: 0.7rem; color: var(--muted); }

    /* ── section title ── */
    .section-title {
      width: 100%;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .section-title span { color: var(--purple); margin-right: 4px; }

    /* ── links ── */
    .links {
      width: 100%;
      display: flex; flex-direction: column; gap: 7px;
      margin-bottom: 16px;
    }
    .link-item {
      display: flex; align-items: center; gap: 11px;
      padding: 9px 13px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 9px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.85rem;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .link-item:hover {
      border-color: rgba(168,85,247,0.4);
      background: var(--purple-glow2);
      transform: translateX(3px);
    }
    .link-icon {
      width: 30px; height: 30px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 0.95rem;
    }
    .link-text { flex: 1; }
    .link-name { font-weight: 500; font-size: 0.82rem; }
    .link-sub  { font-size: 0.68rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .link-arrow { color: var(--muted); font-size: 0.75rem; transition: color 0.2s; }
    .link-item:hover .link-arrow { color: var(--purple); }

    .icon-letterboxd { background: rgba(0,172,93,0.12); }
    .icon-spotify    { background: rgba(30,215,96,0.10); }
    .icon-steam      { background: rgba(102,192,244,0.10); }
    .icon-discord    { background: rgba(88,101,242,0.12); }

    /* ── handles ── */
    .handles {
      width: 100%;
      display: grid; grid-template-columns: 1fr 1fr; gap: 7px;
      margin-bottom: 18px;
    }
    .handle-item {
      background: var(--purple-glow2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 9px 11px;
      transition: border-color 0.2s;
      cursor: pointer;
    }
    .handle-item:hover { border-color: rgba(168,85,247,0.35); }
    .handle-game {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted);
      margin-bottom: 4px;
      display: flex; align-items: center; gap: 4px;
    }
    .handle-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.76rem; color: var(--purple); font-weight: 500;
    }

    /* ── footer ── */
    .footer {
      width: 100%;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      opacity: 0.4;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    /* ── toast ── */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(11,11,18,0.95);
      border: 1px solid var(--purple);
      color: var(--purple);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      padding: 8px 16px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      .spotify-bar { animation: none !important; }
    }
  </style>
</head>
